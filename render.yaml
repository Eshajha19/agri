services:
  - type: web
    name: agri-backend
    env: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: REPORT_SIGNING_SECRET_NAME
        value: report-signing-key
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: agri-frontend
          type: web
      - key: REDIS_URL
        fromService:
          name: agri-redis
          type: keyvalue

  - type: web
    name: agri-celery-worker
    env: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildCommand: ""
    startCommand: "celery -A celery_worker.celery_app worker --loglevel=info --pool=solo"
    envVars:
      - key: REDIS_URL
        fromService:
          name: agri-redis
          type: keyvalue
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: agri-frontend
    env: static
    plan: starter
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    publishPath: ./frontend/build
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_API_BASE_URL
        fromService:
          name: agri-backend
          type: web

  - type: keyvalue
    name: agri-redis
    plan: starter
    region: oregon