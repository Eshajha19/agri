name: Frontend Linting

on:
  push:
    branches: [ main, master ]
    paths:
      - 'agri/frontend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'agri/frontend/**'

jobs:
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agri/frontend/package-lock.json

      - name: Install Dependencies
        working-directory: agri/frontend
        run: npm ci

      - name: Run Lint
        working-directory: agri/frontend
        run: |
          echo "Starting ESLint validation..."
          npm run lint -- --max-warnings 0
          echo "Lint validation completed successfully."

      - name: Generate Lint Summary
        if: always()
        run: |
          echo "### Frontend Lint Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All source files passed validation." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Linting failed. Please check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cache Build Artifacts
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            agri/frontend/dist
            agri/frontend/build
            agri/frontend/coverage
          key: ${{ runner.os }}-lint-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-
