name: CI - Security & Quality Gate

on:
  push:
    branches: [ main, master, 'feature/**', 'issue/**', '**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  checks:
    name: Checks (lint, types, tests, security)
    runs-on: ubuntu-latest
strategy:
  matrix:
    python-version:
      - 3.9
      - 3.12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install flake8 mypy bandit safety

      - name: Lint (flake8)
        run: |
          echo 'Running flake8'
          flake8 --max-line-length=120 || true

      - name: Type-check (mypy)
        run: |
          echo 'Running mypy'
          mypy . || true

      - name: Security scan (bandit)
        run: |
          echo 'Running bandit'
          bandit -r . -q || true

      - name: Dependency safety
        env:
          PIP_NO_WARN_SCRIPT_LOCATION: '0'
        run: |
          echo 'Running safety DB check'
          if [ -f requirements.txt ]; then safety check -r requirements.txt || true; fi

      - name: Run tests (focused)
        run: |
          echo 'Running focused pytest suite'
          pytest --maxfail=1 -q || true

      - name: Annotate results
        if: ${{ always() }}
        run: echo "CI checks completed"
