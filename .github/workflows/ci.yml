name: Fast CI

on:
  push:
    branches:
      - main
      - master

  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lightweight CI dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            fastapi \
            pydantic \
            pytest \
            ruff \
            bandit

      - name: Lint
        run: |
          ruff check .

      - name: Security Scan
        run: |
          bandit -r . -q

      - name: Run Tests
        run: |
          pytest -q --maxfail=1
